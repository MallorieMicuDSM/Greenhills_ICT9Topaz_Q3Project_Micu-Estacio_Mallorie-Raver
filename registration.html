       <form>
           <div class="container mt-4">
       <div style="text-align: center;">
       <h1 style="font-weight: bold;">Registration</h1>
       </div>
       <div class="form-box shadow mx-auto">
           <form>
               <h4>User Information</h4>


                  <div class="profile-container">
        <img id="profilePreview" src="https://via.placeholder.com/150" alt="Profile Picture">
       </div>


        <input type="file" accept="image/*" onchange="previewImage(event)">


        <script>
       function previewImage(event) {
           const reader = new FileReader();
           reader.onload = function(){
               document.getElementById('profilePreview').src = reader.result;
           }
           reader.readAsDataURL(event.target.files[0]);
       }
        </script>


               <div class="col-4 left-panel">
           <div class="profile-img" id="preview"></div>
           </div>
               <input type="button" value="Upload Photo"  class="btn btn-primary btn-block">
               <div class="row mb-3">
                   <div class="col">
                       <label class="form-label">First Name</label>
                       <input type="text" class="form-control" placeholder="First Name">
                   </div>
                   <div class="col">
                       <label class="form-label">Last Name</label>
                       <input type="text" class="form-control" placeholder="Last Name">
                   </div>
               </div>


               <div class="row mb-3">
                   <div class="col">
                       <label class="form-label">Age</label>
                    <input type="text" class="form-control" placeholder="...">
                   </div>
               </div>
               <h4>Contact Details</h4>
               <div class="mb-3">
                   <label class="form-label">Email Address</label>
                   <input type="email" class="form-control" placeholder="Email">
               </div>
               <div class="mb-3">
                   <label class="form-label">Contact Number</label>
                   <input type="text" class="form-control" placeholder="0000-000-0000">
               </div>
               <div class="mb-3">
                   <label class="form-label">Enter Username</label>
                   <input type="text" class="form-control" placeholder="Username">
               </div>
               <div class="mb-3">
                   <label class="form-label">Enter Password</label>
                   <input type="password" class="form-control" placeholder="Password">
               </div>
              
       <div style="text-align: center;">
     <a href="confirmation.html"><button type="button" class="btn " style="background-color: #38a3a5;">Create Account</button></a>
      <input type="reset" style="margin-bottom: 20px;" value="Cancel" class="btn btn-block btn-outline-dark" style="background-color: #38a3a5;">
       </div>
               <div class="mb-3">
               <input type="checkbox" class="form-check-input"> I accept the Terms of Use and Privacy Policy.
               </div>
